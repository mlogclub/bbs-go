<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">bbs-go 功能概览</title>
  <desc id="desc">bbs-go 功能概览图，展示论坛、问答、知识库、讨论、治理和用户激励等核心能力。</desc>
  <defs>
    <linearGradient id="heroGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1677FF"/>
      <stop offset="0.55" stop-color="#075FE5"/>
      <stop offset="1" stop-color="#0A46C5"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#EAF4FF" stop-opacity="1"/>
      <stop offset="0.58" stop-color="#F7FBFF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#143E72" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-16%" y="-18%" width="132%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#143E72" flood-opacity="0.09"/>
    </filter>
    <filter id="chipShadow" x="-12%" y="-14%" width="124%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#143E72" flood-opacity="0.055"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#D8E6F7" stroke-width="1" opacity="0.34"/>
    </pattern>
    <style>
      .font { font-family: Inter, "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .brand-name { fill: #0B6FF4; font-size: 36px; font-weight: 840; }
      .eyebrow { fill: #2563EB; font-size: 18px; font-weight: 760; letter-spacing: 1.8px; }
      .headline { fill: #0F172A; font-size: 62px; font-weight: 820; }
      .subhead { fill: #475569; font-size: 26px; font-weight: 440; }
      .module-title { fill: #111827; font-size: 22px; font-weight: 780; }
      .module-copy { fill: #526173; font-size: 15px; font-weight: 470; }
      .chip-text { fill: #172033; font-size: 12px; font-weight: 650; text-anchor: middle; }
      .ui-title { fill: #0F172A; font-size: 21px; font-weight: 780; }
      .ui-muted { fill: #64748B; font-size: 15px; font-weight: 470; }
      .metric-value { fill: #0F172A; font-size: 24px; font-weight: 800; }
      .metric-label { fill: #64748B; font-size: 13px; font-weight: 560; }
      .footer-title { fill: #0F172A; font-size: 21px; font-weight: 780; }
      .footer-copy { fill: #526173; font-size: 15px; font-weight: 450; }
    </style>
  </defs>


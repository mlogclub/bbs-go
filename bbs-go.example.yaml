Port: 8082
AllowedOrigins:
  - "*"
Installed: false # Whether installation has been completed

# Download data from https://github.com/lionsoul2014/ip2region/tree/master/data
IPLocator:
  IPv4DataPath: # IPv4 data file (ip2region_v4.xdb recommended)
  IPv6DataPath: # IPv6 data file (ip2region_v6.xdb recommended)

# ID encoding and decoding key (automatically generated during installation)
IdCodec:
  Key: 0

# Logger configuration
Logger:
  Filename: /data/logs/bbs-go.log   # Log file location
  MaxSize: 100                      # Maximum file size in MB
  MaxAge: 10                        # Maximum number of days to retain old files
  MaxBackups: 10                    # Maximum number of old files to retain

# Database connection
DB:
  Url: username:password@tcp(localhost:3306)/bbsgo_db?charset=utf8mb4&parseTime=True&multiStatements=true&loc=Local
  MaxIdleConns: 50
  MaxOpenConns: 200
  LogLevel: warn # SQL log level: silent, error, warn, info

# Search
Search:
  IndexPath: # Index path
